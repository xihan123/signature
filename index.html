<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手写签名</title>
    <meta name="author" content="xihan123">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <span class="icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        </span> 手写签名
    </div>

    <div class="settings">
        <div class="setting">
            <label>画笔</label>
            <input type="color" id="penColor" value="#2c2528">
        </div>
        <div class="setting">
            <label>粗细</label>
            <input type="range" id="penSize" min="1" max="20" value="3">
            <span class="pen-size-val" id="penSizeVal">3</span>
        </div>
        <div class="setting">
            <label>
                <input type="checkbox" id="showGrid"> 米字格
            </label>
        </div>
        <div class="setting hidden-control" id="gridRowCol">
            <label>行</label>
            <input type="number" id="gridRows" min="1" value="1">
            <label>列</label>
            <input type="number" id="gridCols" min="1" value="2">
        </div>
        <div class="setting hidden-mobile" id="landscapeSetting">
            <label>
                <input type="checkbox" id="landscapeToggle"> 横屏
            </label>
        </div>
        <div class="setting">
            <label>导出背景</label>
            <input type="color" id="exportBgColor" value="#ffffff">
            <label>
                <input type="checkbox" id="exportTransparent" checked> 透明
            </label>
        </div>
    </div>

    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="gridCanvas"></canvas>
        <canvas id="signatureCanvas"></canvas>
        <div class="placeholder" id="placeholder">在此处签名</div>
    </div>

    <div class="actions">
        <button class="btn btn-undo" id="btnUndo" disabled>撤销</button>
        <button class="btn btn-clear" id="btnClear">清除</button>
        <button class="btn btn-export" id="btnExport">导出图片</button>
    </div>

    <div class="footer">
        <a href="https://github.com/xihan123/signature" target="_blank" rel="noopener">源码</a>
        <a href="https://www.xihan.website" target="_blank" rel="noopener">导航</a>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
